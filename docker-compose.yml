services:
  hearthledger:
    build: .
    image: hearthledger:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/hearthledger.db}
    ports:
      - "${HEARTHLEDGER_PORT:-3000}:3000"
    volumes:
      - hearthledger-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hearthledger-data:
